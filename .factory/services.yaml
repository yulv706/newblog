commands:
  install: npm install
  dev: PORT=3100 npm run dev
  build: npm run build
  start: PORT=3100 npm run start
  typecheck: npx tsc --noEmit
  lint: npm run lint
  test: (node -e "const Database=require('better-sqlite3'); const db=new Database(':memory:'); db.close();" >/dev/null 2>&1 || npm rebuild better-sqlite3 --update-binary) && npx vitest run --reporter=verbose
  db:generate: npx drizzle-kit generate
  db:migrate: npx drizzle-kit migrate
  db:seed: npx tsx src/lib/db/seed.ts

services:
  web:
    start: PORT=3100 npm run dev
    stop: lsof -ti :3100 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100 || exit 1
    port: 3100
    depends_on: []
