commands:
  install: npm install
  build: npm run build
  typecheck: npx tsc --noEmit
  lint: npm run lint
  test: (node -e "const Database=require('better-sqlite3'); const db=new Database(':memory:'); db.close();" >/dev/null 2>&1 || npm rebuild better-sqlite3 --update-binary) && npx vitest run --maxWorkers=4 --reporter=verbose
  db:generate: npx drizzle-kit generate
  db:migrate: npx drizzle-kit migrate
  db:seed: npx tsx src/lib/db/seed.ts
  compose:config: NGINX_PORT=8080 docker compose config
  compose:up: NGINX_PORT=8080 docker compose up --build -d
  compose:down: NGINX_PORT=8080 docker compose down --remove-orphans

services:
  web-dev:
    start: PORT=3100 npm run dev
    stop: sh -c "pids=$(ss -ltnp 2>/dev/null | awk "/:3100 /{print \\$NF}" | sed -n "s/.*pid=\([0-9]\+\).*/\1/p" | sort -u); [ -n "$pids" ] && kill -9 $pids || true"
    healthcheck: curl -sf http://localhost:3100 || exit 1
    port: 3100
    depends_on: []
  compose-stack:
    start: NGINX_PORT=8080 docker compose up --build -d
    stop: NGINX_PORT=8080 docker compose down --remove-orphans
    healthcheck: curl -sf http://localhost:8080 || exit 1
    port: 8080
    depends_on: []
