services:
  mailpit:
    image: axllent/mailpit:v1.30.0
    container_name: blog-mailpit
    profiles:
      - local-mail
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"

  app:
    image: "${APP_IMAGE:-newblog-app:local}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "${APP_VERSION:-0.0.0-dev}"
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
    container_name: blog-app
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SECRET: ${AUTH_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: blog-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./public/uploads:/var/www/public/uploads:ro
